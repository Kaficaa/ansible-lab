---
- hosts: all
  become: true
  tasks:

  - name: install gnupg2
    apt:
      name: gnupg2
      state: present

  - name: download percona-release package
    get_url:
      url: https://repo.percona.com/apt/percona-release_latest.generic_all.deb
      dest: /tmp/percona-release.deb

  - name: install percona-release deb
    apt:
      deb: /tmp/percona-release.deb
  
  - name: enable ps-57 repository
    command: percona-release enable-only ps-57
  
  - name: update repository index
    apt:
      update_cache: yes

  - name: install percona server 5.7
    apt:
      name: percona-server-server-5.7
      state: present

  - name: ensure mysql service is running and enabled
    service:
      name: mysql
      state: started
      enabled: yes
