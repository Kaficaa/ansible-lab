---
- name: Kreiranje foldera i fajla
  hosts: vm2
  become: yes

  tasks:
    - name: Kreiraj folder /opt/laza
      ansible.builtin.file:
        path: /opt/vm1
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Kreiraj joca.txt fajl
      ansible.builtin.file:
        path: /opt/vm1/joca.txt
        state: touch
        owner: root
        group: root
        mode: '0644'
